<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
</head>
<body>
    <h1>タスク一覧</h1>
    
    <div th:if="${success}" style="color: blue;">
        <p th:text="${success}"></p>
    </div>

    <a th:href="@{/tasks/new}">新規タスク作成</a>

    <table border="1" style="margin-top: 10px;">
        <thead>
            <tr>
                <th>ID</th>
                <th>タイトル</th>
                <th>完了状態</th>
                <th>操作</th> </tr>
        </thead>
        <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.id}"></td>
                <td th:text="${task.title}"></td>
                <td th:text="${task.completed ? '完了' : '未完了'}"></td>
                <td>
                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}">編集</a>

                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display:inline;">
                        <button type="submit" onclick="return confirm('本当に削除しますか？');">削除</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
