<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>タスク一覧</h1>
    
    <div th:if="${successMessage}" th:text="${successMessage}" style="color: green;"></div>

    <a th:href="@{/tasks/new}">新規タスクを登録する</a>

   <table class="table table-striped" style="margin-top: 20px;">
        <thead>
            <tr>
                <th>ID</th>
                <th>タイトル</th>
                <th>状態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.id}">1</td>
                <td th:text="${task.title}">タスク名</td>
                <td th:text="${task.completed} ? '完了' : '未完了'">未完了</td>
                <td>
                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}">編集</a>
                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display:inline;">
                        <button type="submit">削除</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
